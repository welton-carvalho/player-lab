name: arquitetura-player-media3
title: Arquitetura de Player Media3 (Android + MVI + Compose)
schema: spec-driven
version: 1.0.0
created_by: github-copilot
description: >-
  Mudança para implementar um módulo de reprodução de vídeo baseado em Jetpack Media3,
  Jetpack Compose e arquitetura MVI. Inclui especificações de configuração, cache,
  construção de MediaSource, ViewModel MVI e uma Composable com Slot API para controles.

